---
argument_specs:
  main:
    short_description: >-
      Installs and configures the L(Minio,https://min.io) server.
    description:
      - Downloads the Minio server binary (B(minio)).
      - Creates a system user and group for running the B(minio) service.
      - Adds a systemd unit for managing the B(minio) service.
      - Creates a minimal B(minio) configuration.
      - Initializes the B(minio) installation with an administrative user.
    options:
      minio_server_system_group:
        type: str
        required: false
        description: Service group for the Minio service.
        default: minio
      minio_server_system_user:
        type: str
        required: false
        description: Service user for the Minio service.
        default: minio
      minio_server_binary_url:
        type: str
        required: false
        description: URL used to download the Minio server binary.
        default: https://dl.min.io/server/minio/release/linux-amd64/minio
      minio_server_binary_path:
        type: path
        required: false
        description: Local filename for the Minio server binary.
        default: /usr/local/bin/minio
      minio_server_storage_dir:
        type: path
        required: false
        description: Local directory to contain all Minio server blobs.
        default: /srv/minio
      minio_server_admin_username:
        type: str
        required: false
        description: Account used to access the Minio Web GUI and cli.
        default: minioadmin
      minio_server_admin_password:
        type: str
        required: false
        description: Password associated with O(minio_server_admin_username).
        default: minioadmin
      minio_server_url:
        type: str
        description: External URL used to access the server.
      minio_server_browser_redirect_url:
        type: str
        description: >-
          External URL used to access the Minio web console.  Useful when
          running Minio behind a reverse proxy (such as Nginx).  See
          L(https://min.io/docs/minio/linux/integrations/setup-nginx-proxy-with-minio.html)
          for more information.
      minio_server_opts:
        type: str
        description: >-
          Additional options to pass to the Minio service.  For example,
          V(--console-address 9090) will cause the Minio console to listen on
          port 9090, as opposed to a random port on each restart.
